name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ai_chatbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:password@localhost:5432/ai_chatbot_test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      OPENAI_API_KEY: test_fake_key_123

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.1"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Setup database
        run: bundle exec rails db:create db:migrate

      - name: Run RSpec
        run: |
          mkdir -p tmp
          bundle exec rspec --format documentation --out tmp/rspec_results.txt

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: rspec-results
          path: tmp/rspec_results.txt
